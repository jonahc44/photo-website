version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "05:00"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      all-frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
      time: "05:00"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      all-backend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "daily"
      time: "05:00"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      all-admin-dependencies:
        patterns:
          - "*"